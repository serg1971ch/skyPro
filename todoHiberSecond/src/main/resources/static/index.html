<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>To Do List</title>
    <link href="css/style.css" rel="stylesheet" type="text/css">
    <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js" type="text/javascript"></script>
    <script type="text/javascript">WebFont.load({  google: {    families: ["Great Vibes:400","Lemonada:300,regular,500,700:latin,latin-ext","Pacifico:regular:cyrillic,latin","Satisfy:regular","Courgette:regular"]  }});</script>
    <!-- [if lt IE 9]><script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js" type="text/javascript"></script><![endif] -->
    <script type="text/javascript">!function(o,c){var n=c.documentElement,t=" w-mod-";n.className+=t+"js",("ontouchstart"in o||o.DocumentTouch&&c instanceof DocumentTouch)&&(n.className+=t+"touch")}(window,document);</script>
    <link href="images/favicon.ico" rel="shortcut icon" type="image/x-icon">
    <link href="https://faviconka.ru/ico/1/faviconka.ru_1_68130.ico" rel="shortcut icon" type="image/x-icon">
    <link href="images/webclip.png" rel="apple-touch-icon">
    <script>console.log("JS не подключается!")</script>
    <script src="/js/jquery-3.4.0.min.js"></script>
    <script src="/js/toDoList.js"></script>
    <link rel="stylesheet" type="text/css" href="/css/style.css">
</head>
<body class="body">
<div class="maincontainer w-container">
    <div class="head_image"><img src="images/writin.jpg" loading="lazy" width="444" height="419" alt="printer" class="image-2">
        <div class="task_link">To do List</div>
    </div>
    <div class="form-block-2 w-form">
        <form id="task-form" name="task-form" data-name="Task Form"><label for="name" class="field-label">Напиши свою задачу</label><input type="text" class="text-field" maxlength="256" name="name" data-name="Name" placeholder="" id="name"><input type="submit" value="Submit" data-wait="Please wait..." class="submit-button w-button"></form>
        <div class="w-form-done">
            <div>Ваша задача добавлена в список дел.</div>
        </div>
        <div class="w-form-delete">
            <div>Ваша задача успешно удалена из списка дел.</div>
        </div>
        <div class="w-form-fail">
            <div>Oops! Что-то пошло не так!.</div>
        </div>
    </div>

    <div class="div_note">
        <ol th:each="task : ${tasks}">
            <li  class="list-_item" th:attr="list-id=${task.indexNumber}"><div class="text_block" th:attr="data-id=${task.indexNumber}" th:text="${task.name}"></div>
                <!--                    <div class="text_block"></div>-->
                <div class="icon_block">
                    <div class="pointer"><div class="icon create"></div>
                    <div class="icon basket" th:attr="task-id=${task.indexNumber}"></div>
                    <div class="icon edite"></div>
                </div>
            </li>
        </ol>
        <p th:text="${someParameter}"></p>
    </div>
    </div><img src="images/cat.png" loading="lazy" width="275" height="380" alt="Totem" class="image-3">

<script src="https://d3e54v103j8qbb.cloudfront.net/js/jquery-3.5.1.min.dc5e7f18c8.js?site=60373d4917ae2a66d26e1384" type="text/javascript" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
</body>
</html>
